# -----------------------------------------------------------------------------
# nuance_config.yaml
# Concept: Register Switching and Memory Management in Social Nuance
# -----------------------------------------------------------------------------

registers:
  germanic:
    mode: "DIRECT_ACCESS"
    priority: "URGENT"
    usage: ["Home", "Street", "Crisis"]
    characteristics: ["Short", "Forceful", "Action-oriented"]
  latinate:
    mode: "ABSTRACTION_LAYER"
    priority: "FORMAL"
    usage: ["Academic", "Legal", "Political"]
    characteristics: ["Polysyllabic", "Abstract", "Structured"]

social_filters:
  understatement_threshold: 0.85 # High frequency in British English
  euphemism_active: true
  irony_bit: 1

protocols:
  criticism:
    protocol: "Understatement"
    input: "This is a total disaster"
    output: "It's not exactly what we had in mind"
  agreement:
    protocol: "Enthusiastic_Nuance"
    input: "Yes"
    output: "I couldn't agree more"
